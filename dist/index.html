<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Translator v3.6 (UI v3.4)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
        }

        h1,
        h2,
        h3,
        button,
        input,
        .font-heading {
            font-family: 'Prompt', sans-serif;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-mS4MdhMU.js"></script>
</head>

<body class="text-slate-800 flex flex-col min-h-screen">

    <!-- Navbar สไตล์ v3.4 -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center max-w-5xl">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-language text-2xl text-blue-600"></i>
                <span class="font-heading font-bold text-xl text-slate-800">Song Translator</span>
                <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full ml-2 font-bold">v3.6</span>
            </div>

            <div class="flex gap-3 items-center">
                <button onclick="login()" id="loginBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">เข้าสู่ระบบ</button>

                <div id="user-menu" class="hidden flex items-center gap-3">
                    <button onclick="openSettings()" class="text-slate-500 hover:text-blue-600 transition"
                        title="ตั้งค่า API Key"><i class="fa-solid fa-gear text-xl"></i></button>
                    <img id="nav-avatar" src="" class="w-8 h-8 rounded-full object-cover border-2 border-blue-200">
                    <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition"
                        title="ออกจากระบบ"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-5xl flex-grow mt-6">

        <!-- กล่องแปลเพลง (ดีไซน์ v3.4) -->
        <div class="bg-white rounded-2xl shadow-sm border p-6 mb-8">
            <h2 class="text-xl font-bold font-heading mb-4 text-slate-800">แปลเนื้อเพลง (Gemini AI)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">ชื่อเพลง</label>
                    <input type="text" id="songTitle"
                        class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                        placeholder="เช่น: โลกที่ไม่มีเธอ">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">ศิลปิน</label>
                    <input type="text" id="artist"
                        class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                        placeholder="เช่น: Portrait">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-600 mb-1">เนื้อเพลงต้นฉบับ</label>
                <textarea id="lyrics"
                    class="w-full border p-3 rounded-lg h-40 outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                    placeholder="วางเนื้อเพลงที่นี่..."></textarea>
            </div>
            <div class="flex justify-end">
                <button onclick="startTranslation()" id="translateBtn"
                    class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold shadow hover:bg-blue-700 transition opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> แปลภาษา
                </button>
            </div>
        </div>

        <!-- ประวัติการแปล (ดึงเฉพาะของตัวเอง) -->
        <h2 class="text-2xl font-bold font-heading mb-4 text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-book-open text-blue-600"></i> คลังเพลงของคุณ
        </h2>
        <div id="userHistoryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12">
            <div class="col-span-full text-center py-10 bg-white rounded-2xl border border-dashed border-slate-300">
                <p class="text-slate-400">กรุณาเข้าสู่ระบบเพื่อดูคลังเพลงของคุณ</p>
            </div>
        </div>

    </main>

    <!-- Settings Modal (BYOK & Profile) ซ่อนไว้ -->
    <div id="settingsModal"
        class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-lg font-bold font-heading">ตั้งค่าโปรไฟล์ & API</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-700"><i
                        class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ชื่อผู้ใช้ (Display Name)</label>
                    <input type="text" id="set-name"
                        class="w-full p-2 border rounded text-sm outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">รูปโปรไฟล์ (URL)</label>
                    <input type="text" id="set-photo"
                        class="w-full p-2 border rounded text-sm outline-none focus:border-blue-500">
                </div>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mt-4">
                    <label class="block text-xs font-bold text-blue-800 mb-1">Gemini API Key (บังคับ)</label>
                    <input type="password" id="set-apikey" placeholder="AI Studio Key..."
                        class="w-full p-2 border rounded text-sm outline-none focus:border-blue-500 mb-2">
                    <label class="flex items-center gap-2 text-xs text-slate-600 cursor-pointer">
                        <input type="checkbox" id="set-savekey" class="w-3 h-3 text-blue-600">
                        เข้ารหัสและเก็บคีย์ไว้ในระบบ
                    </label>
                </div>

                <button onclick="saveProfile()"
                    class="w-full py-2.5 bg-slate-800 text-white font-bold rounded-lg mt-2 hover:bg-slate-900 transition">บันทึกการตั้งค่า</button>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic v3.6 -->
</body>

</html>
